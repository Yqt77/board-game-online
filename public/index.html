<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SZY专属游戏</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="backdrop backdrop-a"></div>
    <div class="backdrop backdrop-b"></div>
    <main class="shell">
      <aside class="panel sidebar">
        <div class="brand">
          <div class="brand-mark">棋</div>
          <div>
            <h1>SZY专属游戏</h1>
            <p>五子棋 · 象棋 · 围棋，SZY专属游戏平台。</p>
          </div>
        </div>
        <div class="user-bar">
          <span id="usernameDisplay"></span>
          <button id="logoutBtn" class="btn btn-sm">退出</button>
        </div>

        <section class="card">
          <h2>创建房间</h2>
          <div class="game-grid">
            <button class="game-tile" data-create="gobang">
              <strong>五子棋</strong>
              <span>15 × 15，先连成五子者胜。</span>
            </button>
            <button class="game-tile" data-create="chess">
              <strong>象棋</strong>
              <span>红方先行，保住将帅。</span>
            </button>
            <button class="game-tile" data-create="go">
              <strong>围棋</strong>
              <span>19 × 19，提子与围地。</span>
            </button>
          </div>
        </section>

        <section class="card">
          <h2>练习模式（人机对战）</h2>
          <div class="game-grid">
            <button class="game-tile" data-practice="gobang">
              <strong>五子棋</strong>
              <span>与电脑对战，适合新手练习。</span>
            </button>
            <button class="game-tile disabled">
              <strong>象棋</strong>
              <span>开发中</span>
            </button>
            <button class="game-tile disabled">
              <strong>围棋</strong>
              <span>开发中</span>
            </button>
          </div>
        </section>

        <section class="card">
          <h2>加入房间</h2>
          <div class="join-row">
            <input id="roomInput" class="input" maxlength="12" placeholder="输入房间号" autocomplete="off" />
            <button id="joinBtn" class="btn btn-primary">加入</button>
          </div>
          <p class="hint">把房间号发给朋友，他在另一台设备打开同一个页面即可加入。</p>
        </section>

        <div id="toast" class="toast" aria-live="polite"></div>
      </aside>

      <section class="panel board-panel">
        <div class="board-head">
          <div>
            <h2 id="boardTitle">等待进入对局</h2>
            <p id="boardSubtitle">创建或加入一个房间后，这里会显示棋盘。</p>
          </div>
          <div class="chip" id="connectionChip">离线</div>
        </div>

        <div id="gameBar" class="game-bar hidden">
          <div class="game-bar-row">
            <div class="game-badge" id="gameBadge">-</div>
            <div class="room-badge" id="roomBadge">-</div>
            <div class="turn-badge" id="turnBadge">-</div>
          </div>
          <div class="game-bar-row">
            <div class="players-display">
              <span class="player-tag mine" id="myPlayerTag">-</span>
              <span class="vs">VS</span>
              <span class="player-tag" id="opponentPlayerTag">等待中</span>
            </div>
          </div>
        </div>

        <div id="statusBar" class="status-bar">
          <span id="statusText">选择一种棋类并创建房间，或输入房间号加入。</span>
        </div>

        <div id="boardActions" class="board-actions hidden">
          <button id="copyLinkBtn" class="btn">复制房间链接</button>
          <button id="restartBtn" class="btn">重新开局</button>
          <button id="passBtn" class="btn hidden">停一手</button>
          <button id="resignBtn" class="btn btn-danger hidden">认输</button>
        </div>

        <div id="boardWrap" class="board-wrap">
          <div id="board" class="board"></div>
        </div>

        <div id="scoreBlock" class="score-block hidden"></div>

        <div class="legend">
          <span id="legendLeft">提示会显示在这里。</span>
          <span id="legendRight"></span>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
